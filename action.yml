name: PostHog Watcher
description: Triage GitHub issues with pi and optionally open straightforward fix PRs
author: marandaneto

branding:
  icon: eye
  color: orange

inputs:
  openai-api-key:
    description: OpenAI API key used by pi
    required: true
  github-token:
    description: GitHub token for issue labels, comments, branches, and PRs
    required: false
    default: ${{ github.token }}
  model:
    description: pi model identifier
    required: false
    default: openai/gpt-5.5:high
  issue-number:
    description: Issue number to process. Defaults to the issue from the event payload.
    required: false
    default: ''
  mode:
    description: auto, triage, investigate, fix, commit-review, or sweep
    required: false
    default: auto
  allow-fix:
    description: Whether the action may create a fix branch and draft PR
    required: false
    default: 'false'
  allow-close:
    description: Whether trusted maintainer close/apply-close commands may close high-confidence issues
    required: false
    default: 'false'
  allow-security-ai:
    description: Whether suspected security-sensitive reports may be sent to pi/OpenAI. Defaults to false.
    required: false
    default: 'false'
  dry-run:
    description: Log intended GitHub mutations without applying them
    required: false
    default: 'false'
  labels:
    description: Comma-separated allowlist of labels the agent may add
    required: false
    default: bug,documentation,enhancement,question,needs-info,good-first-issue
  managed-label-prefix:
    description: Prefix for labels exclusively managed by this action
    required: false
    default: 'posthog-watcher:'
  sync-managed-labels:
    description: Whether to remove stale labels with managed-label-prefix before adding current managed labels
    required: false
    default: 'true'
  max-comments:
    description: Maximum issue comments to include in context
    required: false
    default: '20'
  max-changed-files:
    description: Maximum changed files allowed for an autogenerated PR
    required: false
    default: '5'
  max-diff-lines:
    description: Maximum diff lines allowed for an autogenerated PR
    required: false
    default: '500'
  max-repair-attempts:
    description: Maximum pi repair attempts before giving up on a fix PR. Hard-capped at 3.
    required: false
    default: '2'
  max-related-items:
    description: Maximum related same-repo issues/PRs to include as advisory triage context
    required: false
    default: '5'
  validation-command:
    description: Optional shell command to validate an autogenerated fix before opening a PR
    required: false
    default: ''
  commit-sha:
    description: Commit SHA to review when mode is commit-review. Defaults to github.sha.
    required: false
    default: ''
  max-sweep-items:
    description: Maximum open issues to process in sweep mode
    required: false
    default: '10'
  max-sweep-fix-items:
    description: Maximum sweep items that may attempt fixes. Defaults to 0.
    required: false
    default: '0'
  sweep-query:
    description: GitHub search query suffix for sweep mode
    required: false
    default: 'is:issue is:open archived:false'
  max-pi-calls:
    description: Maximum pi calls allowed for this action run
    required: false
    default: '4'
  pi-timeout-ms:
    description: Timeout in milliseconds for each pi subprocess
    required: false
    default: '600000'
  state-enabled:
    description: Whether to write durable markdown state records and dashboard to state-branch
    required: false
    default: 'false'
  state-repo:
    description: Repository for durable state as owner/repo. Defaults to current repository.
    required: false
    default: ''
  state-branch:
    description: Branch for durable state records and dashboard
    required: false
    default: posthog-watcher-state
  comment-marker:
    description: Hidden marker used to create/update a single durable issue comment
    required: false
    default: '<!-- posthog-watcher-action -->'
  pi-version:
    description: Version of @earendil-works/pi-coding-agent to invoke with npx
    required: false
    default: '0.79.10'

outputs:
  conclusion:
    description: Triage conclusion
  labels:
    description: Labels selected by the agent after allowlist filtering
  comment-url:
    description: Created or updated triage comment URL
  pr-url:
    description: Draft PR URL, when a fix PR was created
  closed:
    description: Whether the issue was closed by an explicit trusted close/apply-close command
  triage-json:
    description: Raw normalized triage JSON

runs:
  using: node24
  main: dist/index.js
