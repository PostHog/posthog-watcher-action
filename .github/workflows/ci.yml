name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

  action-smoke-test:
    name: Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Smoke test bundled action
        run: node --test test/action-smoke.test.mjs

  check-dist:
    name: Check dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Check dist is committed
        run: git diff --exit-code -- dist/index.js
